<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nos Courses & Recettes</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#F0EDE6}
    #root{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#F0EDE6;min-height:100vh;max-width:420px;margin:0 auto;position:relative}

    /* ── SETUP ── */
    .setup-screen{padding:36px 18px 60px;display:flex;flex-direction:column;gap:18px}
    .setup-logo{text-align:center;padding:20px 0 8px}
    .logo-icon{font-size:56px;display:block;margin-bottom:12px}
    .setup-logo h1{font-size:26px;font-weight:800;color:#2A3D2E;line-height:1.2}
    .setup-logo p{font-size:14px;color:#888;margin-top:8px}
    .setup-card{background:#fff;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .setup-card h2{font-size:15px;font-weight:700;color:#2A3D2E}
    .field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#999;margin-bottom:6px}
    .text-input{width:100%;padding:12px 13px;border:1.5px solid #E0DDD6;border-radius:10px;font-family:inherit;font-size:14px;color:#1C1C1C;background:#F0EDE6;outline:none;transition:border-color .15s}
    .text-input:focus{border-color:#2A3D2E}
    .text-input::placeholder{color:#C0BCB6}
    .btn-primary{background:#2A3D2E;color:#fff;border:none;padding:14px;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s}
    .btn-primary:active{opacity:.85}
    details summary{font-size:13px;font-weight:600;color:#2A3D2E;cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:6px}
    details summary::before{content:'▶';font-size:10px;transition:transform .2s}
    details[open] summary::before{transform:rotate(90deg)}
    .sql-block{background:#1A1F1C;color:#7EC88A;border-radius:10px;padding:14px;font-family:'Courier New',monospace;font-size:11px;line-height:1.7;overflow-x:auto;white-space:pre;margin-top:12px}

    /* ── HEADER ── */
    .header{background:#2A3D2E;color:#fff;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:10px;transition:background .3s}
    .header.shopping{background:#B8943A}
    .header h1{font-size:15px;font-weight:800;flex:1}
    .back-link{background:rgba(255,255,255,.18);border:none;color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer;white-space:nowrap}
    .checked-pill{background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
    .sync-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.14);border:none;color:rgba(255,255,255,.9);font-family:inherit;font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;cursor:pointer;white-space:nowrap}
    .sync-pill:hover{background:rgba(255,255,255,.22)}
    .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

    /* ── CONTENT ── */
    .content{padding:14px 14px 90px}
    .content.shop-pad{padding-bottom:152px}

    /* ── NAV ── */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#fff;border-top:1px solid #E0DDD6;display:grid;grid-template-columns:1fr 1fr 1fr;z-index:50}
    .nav-btn{background:none;border:none;padding:10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#999;font-family:inherit;transition:color .15s}
    .nav-btn.active{color:#2A3D2E}
    .nav-icon{font-size:20px}
    .nav-label{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

    /* ── FIN COURSES ── */
    .fin-wrap{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:392px;z-index:45}
    .fin-btn{background:#2A3D2E;color:#fff;border:none;padding:15px;border-radius:13px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(42,61,46,.35);width:100%;transition:opacity .15s}
    .fin-btn:active{opacity:.85}

    /* ── ADD FORM ── */
    .add-form{background:#fff;border-radius:16px;padding:14px;margin-bottom:14px;display:flex;flex-direction:column;gap:9px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .input-row{display:flex;gap:8px;align-items:stretch}
    .qty-input{width:78px;flex:none}
    .cat-row{display:flex;gap:7px;align-items:center}
    .cat-select{flex:1;padding:11px 12px;border:1.5px solid #E0DDD6;border-radius:10px;font-family:inherit;font-size:14px;color:#1C1C1C;background:#F0EDE6;outline:none;cursor:pointer;min-width:0}
    .icon-btn{width:42px;height:42px;border:1.5px solid #E0DDD6;border-radius:10px;background:#F0EDE6;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .icon-btn:hover{border-color:#2A3D2E;background:#fff}
    .btn-add{background:#C8A45A;color:#fff;border:none;padding:12px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .btn-add:active{opacity:.85}

    /* ── AUTOCOMPLETE ── */
    .ac-wrap{position:relative;flex:1;min-width:0}
    .suggestions{position:absolute;top:calc(100% + 5px);left:0;right:0;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.15);z-index:150;overflow:hidden;border:1px solid #EEE}
    .sugg-item{padding:11px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;border-bottom:1px solid #F5F4F1;transition:background .1s}
    .sugg-item:last-child{border-bottom:none}
    .sugg-item:hover{background:#F0EDE6}
    .sugg-name{font-size:14px;font-weight:600;color:#1C1C1C}
    .sugg-meta{font-size:11px;color:#999;white-space:nowrap;text-align:right}

    /* ── START SHOPPING ── */
    .start-shop-btn{background:#2A3D2E;color:#fff;border:none;padding:13px 16px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:18px;transition:opacity .15s}
    .start-shop-btn:active{opacity:.85}

    /* ── SECTION ── */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 7px;padding:0 2px}
    .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;display:flex;align-items:center;gap:7px}
    .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .badge{background:#F5EBD0;color:#C8A45A;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}

    /* ── GROCERY ── */
    .grocery-list{display:flex;flex-direction:column;gap:6px}
    .g-item{background:#fff;border-radius:12px;padding:11px 12px;display:flex;align-items:center;gap:9px;box-shadow:0 1px 4px rgba(0,0,0,.04);border-left:3px solid var(--cc,#5C8A5C)}
    .g-name{font-size:14px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .g-qty{font-size:12px;color:#999;font-weight:600;background:#F0EDE6;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .edit-btn{background:none;border:none;color:#CCC;font-size:15px;cursor:pointer;padding:3px 4px;transition:color .15s;flex-shrink:0}
    .edit-btn:hover{color:#2A3D2E}
    .del-btn{background:none;border:none;color:#CCC;font-size:20px;cursor:pointer;padding:2px 4px;line-height:1;transition:color .15s;flex-shrink:0}
    .del-btn:hover{color:#C94040}

    /* ── SHOPPING ITEMS ── */
    .shop-item{background:#fff;border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s;cursor:pointer;user-select:none}
    .shop-item.done{background:#F7F6F3;box-shadow:none}
    .shop-circle{width:26px;height:26px;border-radius:50%;border:2px solid #E0DDD6;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;transition:all .18s}
    .shop-item:not(.done) .shop-circle:hover{border-color:#4A9E5C;background:#4A9E5C}
    .shop-item.done .shop-circle{background:#4A9E5C;border-color:#4A9E5C}
    .shop-info{flex:1;min-width:0}
    .shop-name{font-size:15px;font-weight:600;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .shop-item.done .shop-name{text-decoration:line-through;color:#AAA;font-weight:500}
    .shop-qty{font-size:12px;color:#BBB;margin-top:1px}

    /* ── EXPENSE CARD ── */
    .expense-card{background:#fff;border-radius:14px;padding:13px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .expense-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .expense-card-title{font-size:13px;font-weight:800;color:#2A3D2E}
    .expense-session-total{font-size:15px;font-weight:800;color:#C8A45A}
    .expense-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F5F3EF}
    .expense-row:last-of-type{border-bottom:none}
    .expense-store{flex:1;font-size:13px;font-weight:600}
    .expense-amount{font-size:14px;font-weight:700;color:#2A3D2E}
    .add-expense-btn{display:flex;align-items:center;justify-content:center;gap:7px;background:#F0EDE6;border:1.5px dashed #D0CDC8;border-radius:9px;padding:9px 13px;color:#999;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;transition:all .15s}
    .add-expense-btn:hover{border-color:#C8A45A;color:#C8A45A}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:44px 20px;color:#999}
    .empty-icon{font-size:42px;margin-bottom:12px}
    .empty p{font-size:14px;line-height:1.7}

    /* ── RECIPES ── */
    .recipe-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#fff;border-radius:14px;padding:4px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .recipe-tabs::-webkit-scrollbar{display:none}
    .rtab{background:none;border:none;padding:9px 13px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;color:#999;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
    .rtab.active{background:#2A3D2E;color:#fff}
    .recipe-list{display:flex;flex-direction:column;gap:10px}
    .recipe-card{background:#fff;border-radius:14px;padding:13px;display:flex;align-items:flex-start;gap:11px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .r-emoji{font-size:28px;flex-shrink:0;margin-top:1px}
    .r-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;margin-top:1px;background:#F0EDE6}
    .photo-upload-btn{display:flex;align-items:center;justify-content:center;gap:7px;background:#F0EDE6;border:1.5px dashed #D0CDC8;border-radius:11px;padding:14px;color:#999;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .15s}
    .photo-upload-btn:hover{border-color:#C8A45A;color:#C8A45A}
    .recipe-photo-preview{position:relative;border-radius:12px;overflow:hidden;height:140px}
    .recipe-photo-preview img{width:100%;height:100%;object-fit:cover;display:block}
    .photo-remove-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .r-info{flex:1;min-width:0}
    .r-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .r-desc{font-size:12px;color:#999;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .r-ing-count{font-size:11px;color:#C8A45A;font-weight:700;margin-top:4px}
    .r-actions{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
    .r-srv{font-size:11px;color:#999;font-weight:600}
    .r-edit-btn{background:none;border:1px solid #E0DDD6;color:#999;padding:4px 8px;border-radius:7px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:600}
    .r-edit-btn:hover{border-color:#2A3D2E;color:#2A3D2E}
    .copy-recipe-btn{background:#F0EDE6;border:1px solid #E0DDD6;color:#666;padding:4px 8px;border-radius:7px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:600}
    .copy-recipe-btn:hover{background:#F5EBD0;border-color:#C8A45A;color:#9A7820}
    .copy-dest-list{display:flex;flex-direction:column;gap:8px}
    .copy-dest-row{background:#F7F6F3;border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:10px}
    .copy-dest-icon{font-size:18px;flex-shrink:0}
    .copy-dest-name{flex:1;font-size:13px;font-weight:600;color:#1C1C1C}
    .copy-dest-btns{display:flex;gap:6px}
    .btn-copy-to{background:#F5EBD0;border:1.5px solid #C8A45A;color:#9A7820;padding:6px 10px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
    .btn-copy-to:hover{background:#C8A45A;color:#fff}
    .btn-move-to{background:#F0EDE6;border:1.5px solid #D0CDC8;color:#555;padding:6px 10px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
    .btn-move-to:hover{background:#2A3D2E;color:#fff;border-color:#2A3D2E}
    .add-courses-btn{background:#F5EBD0;border:1.5px solid #C8A45A;color:#9A7820;padding:5px 10px;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
    .add-courses-btn:hover{background:#C8A45A;color:#fff;border-color:#C8A45A}
    .add-recipe-card{background:#fff;border-radius:14px;border:1.5px dashed #D0CDC8;padding:14px;display:flex;align-items:center;gap:10px;color:#999;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:all .15s}
    .add-recipe-card:hover{border-color:#2A3D2E;color:#2A3D2E}

    /* ── BILAN ── */
    .bilan-period-tabs{display:flex;background:#fff;border-radius:12px;padding:4px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .bilan-ptab{flex:1;background:none;border:none;padding:9px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;color:#999;cursor:pointer;transition:all .15s}
    .bilan-ptab.active{background:#2A3D2E;color:#fff}
    .bilan-summary{background:linear-gradient(135deg,#2A3D2E,#3D5C42);border-radius:14px;padding:18px;margin-bottom:14px;color:#fff}
    .bilan-sum-label{font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.05em}
    .bilan-sum-amount{font-size:32px;font-weight:800;margin:4px 0 2px}
    .bilan-sum-sub{font-size:12px;opacity:.65}
    .bilan-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:10px}
    .bilan-card-head{background:#F5F3EF;padding:11px 15px;display:flex;align-items:center;justify-content:space-between}
    .bilan-period-label{font-size:13px;font-weight:700;color:#2A3D2E;text-transform:capitalize}
    .bilan-total-amount{font-size:15px;font-weight:800;color:#2A3D2E}
    .bilan-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:7px}
    .bilan-store-row{display:flex;align-items:center;gap:9px}
    .bilan-store-name{font-size:13px;font-weight:600;width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bilan-bar-track{flex:1;background:#F0EDE6;border-radius:4px;height:7px;overflow:hidden}
    .bilan-bar-fill{height:100%;background:#C8A45A;border-radius:4px;transition:width .4s}
    .bilan-store-amt{font-size:13px;font-weight:700;color:#444;white-space:nowrap;width:64px;text-align:right}
    .trend-chart-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .trend-chart-title{font-size:12px;font-weight:700;color:#2A3D2E;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
    .trend-svg{width:100%;height:110px;display:block}
    .bilan-card-head{cursor:pointer}
    .bilan-expand-arrow{font-size:11px;color:#AAA;width:14px;text-align:center;flex-shrink:0}
    .bilan-detail-list{display:flex;flex-direction:column;padding:0 14px 10px}
    .bilan-detail-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid #F0EDE6}
    .bilan-detail-date{font-size:11px;color:#AAA;width:42px;flex-shrink:0}
    .bilan-detail-store{flex:1;font-size:13px;font-weight:600;color:#333;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bilan-detail-amt{font-size:13px;font-weight:700;color:#2A3D2E;white-space:nowrap}

    /* ── OVERLAY & SHEET ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .sheet{background:#fff;border-radius:24px 24px 0 0;padding:18px 18px 32px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;animation:up .22s cubic-bezier(.34,1.15,.64,1);max-height:92vh;overflow-y:auto}
    @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .handle{width:36px;height:4px;background:#E0DDD6;border-radius:2px;margin:0 auto 2px;flex-shrink:0}
    .sheet-title{font-size:17px;font-weight:800;color:#2A3D2E;flex-shrink:0}
    .modal-actions{display:flex;gap:9px;flex-shrink:0}
    .btn-cancel{background:#F0EDE6;border:none;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;color:#999;cursor:pointer;flex:1}
    .btn-save{flex:2;background:#2A3D2E;color:#fff;border:none;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
    .btn-save:active{opacity:.85}
    .btn-save:disabled{opacity:.4;cursor:default}
    .btn-danger{background:#FEF2F2;border:none;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;color:#C94040;cursor:pointer;width:100%;flex-shrink:0}
    .btn-danger:hover{background:#FCDCDC}

    /* ── CATEGORIES MODAL ── */
    .cat-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
    .cat-row-item{display:flex;align-items:center;gap:8px;background:#F7F6F3;border-radius:10px;padding:9px 11px}
    .cat-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .cat-item-name{flex:1;font-size:14px;font-weight:600;color:#1C1C1C}
    .cat-edit-input{flex:1;padding:5px 9px;border:1.5px solid #2A3D2E;border-radius:7px;font-family:inherit;font-size:14px;font-weight:600;outline:none;background:#fff}
    .cat-action-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:2px 4px;color:#999;transition:color .15s;flex-shrink:0}
    .cat-action-btn:hover{color:#1C1C1C}
    .cat-save-btn{background:#2A3D2E;color:#fff;border:none;padding:5px 11px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    .cat-order-btns{display:flex;gap:3px}
    .cat-order-btn{background:none;border:1px solid #E0DDD6;color:#999;width:24px;height:24px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0;transition:all .12s}
    .cat-order-btn:hover:not(:disabled){border-color:#2A3D2E;color:#2A3D2E}
    .cat-order-btn:disabled{opacity:.25;cursor:default}
    .new-cat-row{display:flex;gap:7px;align-items:center}

    @keyframes ta{0%{opacity:0;transform:translateX(-50%) translateY(8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}78%{opacity:1}100%{opacity:0}}
  </style>

<body>
<div id="root"></div>
<script>
const { createClient } = supabase;

/* ── CONSTANTS ─────────────────────────────────────────────── */
const RECIPE_LISTS = ["Recettes maison","Recettes boulot Mathias","Recettes boulot Alexia","Idée recette"];
const LIST_ICONS   = ["🏠","💼","💼","💡"];
const EMOJIS = ["🍝","🍗","🥗","🍕","🥩","🥘","🍜","🍲","🐟","🥚","🌮","🍱","🥞","🍛","🥙","🫕","🫔","🥜","🧆","🧇"];
const COLORS = ["#4A7C59","#C8A45A","#D4747A","#7A8DC8","#8AC8C0","#C89A5C","#A08AC8","#6BA3BE","#BE8C6B","#7ABE8C","#BE7A7A","#8ABE7A"];
const FR_MONTHS   = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const FR_MONTHS_S = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];

const SQL = `-- ① Coller dans Supabase → SQL Editor → New query

CREATE TABLE categories (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  name TEXT NOT NULL, sort_order INTEGER DEFAULT 0,
  created_at TIMESTAMPTZ DEFAULT NOW()
);
INSERT INTO categories (name, sort_order) VALUES
  ('Légumes',0),('Fruits',1),('Viandes & Poissons',2),
  ('Produits laitiers',3),('Épicerie',4),('Boissons',5),('Hygiène',6),('Autre',7);
ALTER TABLE categories ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON categories FOR ALL USING (true);

CREATE TABLE grocery_items (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  name TEXT NOT NULL, quantity TEXT,
  category TEXT DEFAULT 'Autre', checked BOOLEAN DEFAULT false,
  created_at TIMESTAMPTZ DEFAULT NOW()
);
ALTER TABLE grocery_items ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON grocery_items FOR ALL USING (true);

CREATE TABLE recipes (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  name TEXT NOT NULL, description TEXT,
  list_index INTEGER DEFAULT 0, servings INTEGER DEFAULT 2,
  emoji TEXT DEFAULT '🍝', ingredients JSONB DEFAULT '[]', photo TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);
ALTER TABLE recipes ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON recipes FOR ALL USING (true);

CREATE TABLE expenses (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  store TEXT NOT NULL, amount NUMERIC(10,2) NOT NULL,
  expense_date DATE NOT NULL DEFAULT CURRENT_DATE,
  session_id TEXT, created_at TIMESTAMPTZ DEFAULT NOW()
);
ALTER TABLE expenses ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON expenses FOR ALL USING (true);

-- ② Activer Realtime : Supabase → Database → Replication
--    Cocher : categories, grocery_items, recipes, expenses

-- ③ Si les tables existent déjà (mise à jour) exécute seulement :
-- ALTER TABLE recipes ADD COLUMN IF NOT EXISTS photo TEXT;`;

/* ── STATE ──────────────────────────────────────────────────── */
let db = null;
let S = {
  configured:false, tab:'courses', shoppingMode:false, shoppingSessionId:null,
  categories:[], groceries:[], recipes:[], expenses:[],
  syncStatus:'connecting', recipeList:0, bilanPeriod:'semaine',
  modal:null,
  newName:'', newQty:'', newCat:'',
  editItemId:null,
  editingCatIdx:null, editingCatVal:'', newCatName:'',
  recipeFormId:null,
  recipeForm:{name:'',description:'',servings:2,emoji:'🍝',ingredients:[],photo:null},
  newIngName:'', newIngQty:'', newIngCat:'',
  addToCoursesRecipe:null, selectedIngs:{},
  copyRecipeId:null,
  expenseForm:{store:'',amount:'',date:''},
  editExpenseId:null, expandedBilanKey:null,
};

/* ── UTILS ──────────────────────────────────────────────────── */
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getCatColor = cat => { const i=S.categories.findIndex(c=>c.name===cat); return COLORS[i>=0?i%COLORS.length:COLORS.length-1]; };
const fmt = n => parseFloat(n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
const todayStr = () => new Date().toISOString().split('T')[0];

const getWeekMonday = ds => { const d=new Date(ds+'T12:00:00'),day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1)); return d.toISOString().split('T')[0]; };
const getMonthKey = ds => { const d=new Date(ds+'T12:00:00'); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const fmtWeekLabel = ds => {
  const mon=new Date(ds+'T12:00:00'), sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const [d1,m1]=[mon.getDate(),FR_MONTHS_S[mon.getMonth()]];
  const [d2,m2]=[sun.getDate(),FR_MONTHS[sun.getMonth()]];
  return mon.getMonth()===sun.getMonth()?`${d1} – ${d2} ${m2}`:`${d1} ${m1} – ${d2} ${m2}`;
};
const fmtMonthLabel = ds => { const d=new Date(ds+'T12:00:00'); return `${FR_MONTHS[d.getMonth()]} ${d.getFullYear()}`; };
const fmtShortDate = ds => { if(!ds) return ''; const d=new Date(ds+'T12:00:00'); return `${d.getDate()} ${FR_MONTHS_S[d.getMonth()]}`; };
const fmtShortWeekLabel = key => { const d=new Date(key+'T12:00:00'); return `${d.getDate()}/${d.getMonth()+1}`; };
const fmtShortMonthLabel = key => { const m=parseInt(key.split('-')[1],10); return FR_MONTHS_S[m-1]; };

/* ── QUANTITY MERGE (feature: fusion d'ingrédients identiques) ─ */
function parseQty(q){
  if(!q) return null;
  const m=String(q).trim().match(/^([\d]+(?:[.,]\d+)?)\s*(.*)$/);
  if(!m) return null;
  return {num:parseFloat(m[1].replace(',','.')), unit:m[2].trim().toLowerCase()};
}
function mergeQuantities(a,b){
  a=(a||'').trim(); b=(b||'').trim();
  if(!a) return b;
  if(!b) return a;
  if(a.toLowerCase()===b.toLowerCase()) return a;
  const qa=parseQty(a), qb=parseQty(b);
  if(qa&&qb&&qa.unit===qb.unit){
    const sum=qa.num+qb.num;
    const sumStr=Number.isInteger(sum)?String(sum):String(Math.round(sum*100)/100);
    return qa.unit?`${sumStr} ${qa.unit}`:sumStr;
  }
  return `${a} + ${b}`;
}

const groupExpenses = (exps, period) => {
  const groups={};
  exps.forEach(e => {
    const date=e.expense_date||todayStr();
    const key=period==='semaine'?getWeekMonday(date):getMonthKey(date);
    const label=period==='semaine'?fmtWeekLabel(date):fmtMonthLabel(date);
    if(!groups[key]) groups[key]={key,label,items:[]};
    groups[key].items.push(e);
  });
  return Object.values(groups)
    .sort((a,b)=>b.key.localeCompare(a.key)).slice(0,period==='semaine'?10:6)
    .map(g => {
      const total=g.items.reduce((s,e)=>s+parseFloat(e.amount||0),0);
      const byStore={};
      g.items.forEach(e=>{byStore[e.store]=(byStore[e.store]||0)+parseFloat(e.amount||0);});
      const stores=Object.entries(byStore).map(([store,amount])=>({store,amount,pct:total>0?Math.round(amount/total*100):0})).sort((a,b)=>b.amount-a.amount);
      return {...g,total,stores};
    });
};

/* ── HISTORY ────────────────────────────────────────────────── */
const getHist = () => { try{return JSON.parse(localStorage.getItem('nhist')||'[]');}catch{return[];} };
const addToHist = (name,qty,cat) => { const h=[{name,quantity:qty,category:cat},...getHist().filter(x=>x.name.toLowerCase()!==name.toLowerCase())].slice(0,60); localStorage.setItem('nhist',JSON.stringify(h)); };

/* ── SUPABASE ───────────────────────────────────────────────── */
function initDB(url,key){ db=createClient(url,key); }

function subscribeRealtime(){
  db.channel('app-sync')
    .on('postgres_changes',{event:'*',schema:'public',table:'categories'},()=>fetchCategories())
    .on('postgres_changes',{event:'*',schema:'public',table:'grocery_items'},()=>fetchGroceries())
    .on('postgres_changes',{event:'*',schema:'public',table:'recipes'},()=>fetchRecipes())
    .on('postgres_changes',{event:'*',schema:'public',table:'expenses'},()=>fetchExpenses())
    .subscribe(status=>{
      S.syncStatus=status==='SUBSCRIBED'?'connected':(status==='CLOSED'||status==='CHANNEL_ERROR'?'error':'connecting');
      updateSyncUI();
    });
}

function updateSyncUI(){
  const colors={connecting:'#F59E0B',connected:'#4ADE80',error:'#F87171'};
  const labels={connecting:'Connexion…',connected:'Synchro',error:'Erreur'};
  const dot=document.querySelector('.sync-dot');
  const lbl=document.querySelector('.sync-label');
  if(dot){dot.style.background=colors[S.syncStatus];dot.style.animation=S.syncStatus==='connected'?'blink 2.5s infinite':'none';}
  if(lbl) lbl.textContent=labels[S.syncStatus];
}

/* ── FETCH ──────────────────────────────────────────────────── */
async function fetchCategories(){
  const {data,error}=await db.from('categories').select('*').order('sort_order').order('created_at');
  if(error){console.error('categories:',error);return;}
  S.categories=data||[];
  if(!S.categories.some(c=>c.name===S.newCat)) S.newCat=S.categories[0]?.name||'';
  if(!S.categories.some(c=>c.name===S.newIngCat)) S.newIngCat=S.categories[0]?.name||'';
  render();
}
async function fetchGroceries(){
  const {data}=await db.from('grocery_items').select('*').order('created_at');
  S.groceries=data||[]; render();
}
async function fetchRecipes(){
  const {data}=await db.from('recipes').select('*').order('created_at');
  S.recipes=data||[]; render();
}
async function fetchExpenses(){
  const {data}=await db.from('expenses').select('*').order('expense_date',{ascending:false}).order('created_at',{ascending:false});
  S.expenses=data||[]; render();
}
async function fetchAll(){ await Promise.all([fetchCategories(),fetchGroceries(),fetchRecipes(),fetchExpenses()]); }

/* ── CATEGORIES CRUD ────────────────────────────────────────── */
async function addCategory(name){
  const sort_order=S.categories.length?Math.max(...S.categories.map(c=>c.sort_order))+1:0;
  await db.from('categories').insert({name,sort_order});
}
async function renameCategory(id,newName){
  const old=S.categories.find(c=>c.id===id)?.name;
  await db.from('categories').update({name:newName}).eq('id',id);
  if(old&&old!==newName) await db.from('grocery_items').update({category:newName}).eq('category',old);
}
async function deleteCategory(id){
  const cat=S.categories.find(c=>c.id===id);
  if(!cat) return;
  const fallback=S.categories.find(c=>c.id!==id)?.name||'Autre';
  await db.from('grocery_items').update({category:fallback}).eq('category',cat.name);
  await db.from('categories').delete().eq('id',id);
}
async function moveCategoryOrder(idx,dir){
  const j=idx+dir;
  if(j<0||j>=S.categories.length) return;
  const a=S.categories[idx],b=S.categories[j];
  const soA=a.sort_order,soB=b.sort_order;
  S.categories[idx]={...a,sort_order:soB}; S.categories[j]={...b,sort_order:soA};
  S.categories.sort((x,y)=>x.sort_order-y.sort_order); render();
  await Promise.all([db.from('categories').update({sort_order:soB}).eq('id',a.id),db.from('categories').update({sort_order:soA}).eq('id',b.id)]);
}

/* ── GROCERY CRUD ───────────────────────────────────────────── */
async function addGrocery(name,quantity,category){
  const existing=S.groceries.find(g=>g.name.trim().toLowerCase()===name.trim().toLowerCase());
  if(existing){
    const merged=mergeQuantities(existing.quantity,quantity);
    await updateGrocery(existing.id,{quantity:merged||null});
    showToast(`Quantités fusionnées : ${existing.name} → ${merged||'—'}`);
    return;
  }
  const tmp={id:'tmp-'+Date.now(),name,quantity,category,checked:false};
  S.groceries.push(tmp); render();
  const {data}=await db.from('grocery_items').insert({name,quantity:quantity||null,category}).select().single();
  if(data){S.groceries=S.groceries.map(g=>g.id===tmp.id?data:g); render();}
}
async function updateGrocery(id,changes){
  S.groceries=S.groceries.map(g=>g.id===id?{...g,...changes}:g); render();
  await db.from('grocery_items').update(changes).eq('id',id);
}
async function deleteGrocery(id){
  S.groceries=S.groceries.filter(g=>g.id!==id); render();
  await db.from('grocery_items').delete().eq('id',id);
}
async function uncheckAll(){
  S.groceries=S.groceries.map(g=>({...g,checked:false})); render();
  await db.from('grocery_items').update({checked:false}).neq('checked',false);
}
async function deleteChecked(){
  S.groceries=S.groceries.filter(g=>!g.checked); render();
  await db.from('grocery_items').delete().eq('checked',true);
}

/* ── RECIPE CRUD ─────────────────────────────────────────────  */
async function addRecipe(form,listIndex){
  const {data}=await db.from('recipes').insert({name:form.name.trim(),description:form.description?.trim()||null,list_index:listIndex,servings:form.servings,emoji:form.emoji,ingredients:form.ingredients||[],photo:form.photo||null}).select().single();
  if(data){S.recipes.push(data);render();}
}
async function updateRecipe(id,form){
  S.recipes=S.recipes.map(r=>r.id===id?{...r,...form,name:form.name.trim()}:r); render();
  await db.from('recipes').update({name:form.name.trim(),description:form.description?.trim()||null,servings:form.servings,emoji:form.emoji,ingredients:form.ingredients||[],photo:form.photo||null}).eq('id',id);
}
async function deleteRecipe(id){
  S.recipes=S.recipes.filter(r=>r.id!==id); render();
  await db.from('recipes').delete().eq('id',id);
}
async function addIngsToCourses(recipe,selIdxs){
  const ings=(recipe.ingredients||[]).filter((_,i)=>selIdxs[i]);
  if(!ings.length) return;
  let added=0, merged=0;
  const newRows=[];
  for(const ing of ings){
    const cat=(ing.category&&S.categories.some(c=>c.name===ing.category))?ing.category:(S.categories[0]?.name||'Autre');
    const existing=S.groceries.find(g=>g.name.trim().toLowerCase()===ing.name.trim().toLowerCase());
    if(existing){
      const mergedQty=mergeQuantities(existing.quantity,ing.qty);
      await updateGrocery(existing.id,{quantity:mergedQty||null});
      merged++;
    } else {
      newRows.push({name:ing.name,quantity:ing.qty||null,category:cat,checked:false});
      added++;
    }
  }
  if(newRows.length){
    const {data}=await db.from('grocery_items').insert(newRows).select();
    if(data){S.groceries.push(...data);render();}
  }
  const parts=[];
  if(added) parts.push(`${added} ajouté${added>1?'s':''}`);
  if(merged) parts.push(`${merged} fusionné${merged>1?'s':''}`);
  showToast(`🛒 ${parts.join(' · ')}`);
}

/* ── EXPENSE CRUD ───────────────────────────────────────────── */
async function addExpense(store,amount,sessionId,date){
  const expense_date=date||todayStr();
  const tmp={id:'tmp-'+Date.now(),store,amount:parseFloat(amount),expense_date,session_id:sessionId};
  S.expenses=[tmp,...S.expenses]; render();
  const {data}=await db.from('expenses').insert({store,amount:parseFloat(amount),expense_date,session_id:sessionId}).select().single();
  if(data){S.expenses=S.expenses.map(e=>e.id===tmp.id?data:e);render();}
}
async function updateExpense(id,changes){
  S.expenses=S.expenses.map(e=>e.id===id?{...e,...changes}:e); render();
  await db.from('expenses').update(changes).eq('id',id);
}
async function deleteExpense(id){
  S.expenses=S.expenses.filter(e=>e.id!==id); render();
  await db.from('expenses').delete().eq('id',id);
}

/* ── TOAST ──────────────────────────────────────────────────── */
function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}

/* ── RENDER ─────────────────────────────────────────────────── */
function render(){
  const root=document.getElementById('root');
  if(!S.configured){root.innerHTML=renderSetup();return;}
  root.innerHTML=renderApp(); updateSyncUI();
}

function renderSetup(){
  return `<div class="setup-screen">
  <div class="setup-logo"><span class="logo-icon">🛒</span><h1>Nos Courses<br>&amp; Recettes</h1><p>Synchronisé en temps réel entre vos téléphones</p></div>
  <div class="setup-card">
    <h2>⚙️ Configuration Supabase</h2>
    <div><div class="field-label">URL du projet</div><input class="text-input" id="sb-url" placeholder="https://xxxx.supabase.co" type="url" autocomplete="off" spellcheck="false" value="${esc(localStorage.getItem('sb_url')||'')}"></div>
    <div><div class="field-label">Clé publique (anon key)</div><input class="text-input" id="sb-key" placeholder="eyJhbGciOiJIUzI1NiIs…" type="password" autocomplete="off"></div>
    <button class="btn-primary" data-action="connect">Connecter →</button>
    <p style="font-size:12px;color:#999;text-align:center">Clés dans Supabase → Project Settings → API</p>
  </div>

function renderApp(){

  const checkedCount=S.groceries.filter(g=>g.checked).length;

  if(S.shoppingMode){

  let content='';

  else if(S.tab==='recettes') content=renderRecettes();

  let modal='';

  else if(S.modal==='addToCourses') modal=renderAddToCoursesModal();
  else if(S.modal==='expense') modal=renderExpenseModal();

  return `${header}<div class="content ${S.shoppingMode?'shop-pad':''}">${content}</div>${finBtn}${nav}${modal}`;
}

function byCategory(groceries){
  const map={};
  S.categories.forEach(c=>{if(groceries.some(g=>g.category===c.name)) map[c.name]=[];});
  groceries.forEach(g=>{const c=S.categories.some(x=>x.name===g.category)?g.category:(S.categories[0]?.name||'Autre');if(!map[c])map[c]=[];map[c].push(g);});
  return map;
}

function renderTrendChart(groups,period){
  if(groups.length<2) return '';
  const chrono=[...groups].reverse();
  const max=Math.max(...chrono.map(g=>g.total),1);
  const w=340,h=120,padBottom=22,padTop=10,gap=8;
  const n=chrono.length;
  const barW=(w-(n-1)*gap)/n;
  const bars=chrono.map((g,i)=>{
    const barH=Math.max(2,Math.round((g.total/max)*(h-padTop-padBottom)));
    const x=i*(barW+gap), y=h-padBottom-barH;
    const isCur=i===n-1;
    const label=period==='semaine'?fmtShortWeekLabel(g.key):fmtShortMonthLabel(g.key);
    return `<g><rect x="${x.toFixed(1)}" y="${y}" width="${barW.toFixed(1)}" height="${barH}" rx="4" fill="${isCur?'#C8A45A':'#B9CDB9'}"></rect><text x="${(x+barW/2).toFixed(1)}" y="${h-6}" text-anchor="middle" font-size="9" fill="#999">${esc(label)}</text><text x="${(x+barW/2).toFixed(1)}" y="${y-4}" text-anchor="middle" font-size="9" font-weight="700" fill="#666">${g.total>=100?Math.round(g.total):fmt(g.total).replace(',00','')}</text></g>`;
  }).join('');
  return `<div class="trend-chart-card"><div class="trend-chart-title">📈 Évolution ${period==='semaine'?'hebdomadaire':'mensuelle'}</div><svg viewBox="0 0 ${w} ${h}" class="trend-svg" preserveAspectRatio="none">${bars}</svg></div>`;
}

    if(i===recipe.list_index) return '';
    return `<div class="copy-dest-row"><span class="copy-dest-icon">${LIST_ICONS[i]}</span><span class="copy-dest-name">${esc(name)}</span><div class="copy-dest-btns"><button class="btn-copy-to" data-action="copy-recipe-to" data-id="${recipe.id}" data-val="${i}">📋 Copier</button><button class="btn-move-to" data-action="move-recipe-to" data-id="${recipe.id}" data-val="${i}">↗ Déplacer</button></div></div>`;
  }).join('');
  return `<div class="overlay" data-action="close-modal"><div class="sheet"><div class="handle"></div><div class="sheet-title">${esc(recipe.emoji||'🍽️')} ${esc(recipe.name)}</div><p style="font-size:13px;color:#999;margin-bottom:4px">Copier ou déplacer vers une autre liste :</p><div class="copy-dest-list">${rows}</div><button class="btn-cancel" style="width:100%;margin-top:4px" data-action="close-modal">Annuler</button></div></div>`;
}

/* ── EVENTS ─────────────────────────────────────────────────── */
document.addEventListener('click', async e => {
  if(e.target.classList.contains('overlay')){closeModal();return;}
  const btn=e.target.closest('[data-action]'); if(!btn) return;
  const {action,val,id}=btn.dataset;
  const idx=btn.dataset.idx!==undefined?parseInt(btn.dataset.idx):undefined;
  const dir=btn.dataset.dir!==undefined?parseInt(btn.dataset.dir):undefined;

  switch(action){
    case 'connect': await doConnect(); break;
    case 'tab': S.tab=val; S.shoppingMode=false; render(); break;
    case 'open-cats': S.modal='categories'; S.editingCatIdx=null; S.newCatName=''; render(); setTimeout(()=>document.getElementById('new-cat-inp')?.focus(),50); break;
    case 'add-grocery': await doAddGrocery(); break;
    case 'edit-grocery': S.modal='editItem'; S.editItemId=id; render(); setTimeout(()=>document.getElementById('edit-name')?.focus(),50); break;
    case 'save-edit-item': await doSaveEditItem(); break;
    case 'confirm-delete-grocery': await deleteGrocery(id); closeModal(); break;
    case 'delete-grocery': await deleteGrocery(id); break;
    case 'enter-shopping': await uncheckAll(); S.shoppingMode=true; S.shoppingSessionId='s-'+Date.now(); saveShoppingState(); render(); break;
    case 'exit-shopping': S.shoppingMode=false; clearShoppingState(); render(); break;
    case 'toggle-checked': await updateGrocery(id,{checked:!S.groceries.find(g=>g.id===id)?.checked}); break;
    case 'fin-courses': await doFinCourses(); break;
    case 'open-expense': S.modal='expense'; S.editExpenseId=null; S.expenseForm={store:'',amount:'',date:todayStr()}; render(); setTimeout(()=>document.getElementById('exp-store')?.focus(),50); break;
    case 'edit-expense': { const exp=S.expenses.find(x=>x.id===id); if(!exp) break; S.modal='expense'; S.editExpenseId=id; S.expenseForm={store:exp.store,amount:String(exp.amount),date:exp.expense_date||todayStr()}; render(); setTimeout(()=>document.getElementById('exp-store')?.focus(),50); break; }
    case 'pick-store': S.expenseForm={...S.expenseForm,store:val}; render(); setTimeout(()=>document.getElementById('exp-amount')?.focus(),50); break;
    case 'save-expense': await doSaveExpense(); break;
    case 'delete-expense': await deleteExpense(id); break;
    case 'confirm-delete-expense': await deleteExpense(id); closeModal(); break;
    case 'bilan-period': S.bilanPeriod=val; render(); break;
    case 'toggle-bilan-group': S.expandedBilanKey=S.expandedBilanKey===val?null:val; render(); break;
    case 'start-edit-cat': S.editingCatIdx=idx; S.editingCatVal=S.categories[idx]?.name||''; render(); setTimeout(()=>document.getElementById('cat-edit-inp')?.focus(),50); break;
    case 'cancel-edit-cat': S.editingCatIdx=null; render(); break;
    case 'save-edit-cat': await doSaveEditCat(idx); break;
    case 'delete-cat': if(S.categories.length<=1){showToast('Impossible de supprimer la dernière !');break;} await deleteCategory(id); break;
    case 'move-cat': await moveCategoryOrder(idx,dir); break;
    case 'add-cat': await doAddCat(); break;
    case 'recipe-tab': S.recipeList=parseInt(val); render(); break;
    case 'new-recipe': S.modal='recipe'; S.recipeFormId=null; S.recipeForm={name:'',description:'',servings:2,emoji:'🍝',ingredients:[],photo:null}; S.newIngName=''; S.newIngQty=''; S.newIngCat=S.categories[0]?.name||''; render(); setTimeout(()=>document.getElementById('recipe-name')?.focus(),50); break;
    case 'edit-recipe': { const r=S.recipes.find(x=>x.id===id); if(!r) break; S.modal='recipe'; S.recipeFormId=id; S.recipeForm={...r,ingredients:Array.isArray(r.ingredients)?[...r.ingredients]:[],photo:r.photo||null}; S.newIngName=''; S.newIngQty=''; S.newIngCat=S.categories[0]?.name||''; render(); setTimeout(()=>document.getElementById('recipe-name')?.focus(),50); break; }
    case 'remove-photo': S.recipeForm.photo=null; render(); break;
    case 'save-recipe': await doSaveRecipe(); break;
    case 'delete-recipe': await deleteRecipe(id); break;
    case 'add-ing': doAddIng(); break;
    case 'remove-ing': S.recipeForm.ingredients=S.recipeForm.ingredients.filter((_,j)=>j!==idx); render(); break;
    case 'pick-emoji': S.recipeForm.emoji=val; render(); break;
    case 'srv-minus': if(S.recipeForm.servings>1){S.recipeForm.servings--;const el=document.getElementById('srv-val');if(el)el.textContent=S.recipeForm.servings;} break;
    case 'srv-plus': S.recipeForm.servings++;{const el=document.getElementById('srv-val');if(el)el.textContent=S.recipeForm.servings;} break;
    case 'add-to-courses': { const r=S.recipes.find(x=>x.id===id); if(!r?.ingredients?.length){showToast('Aucun ingrédient dans cette recette');break;} S.modal='addToCourses'; S.addToCoursesRecipe=r; S.selectedIngs={}; r.ingredients.forEach((_,i2)=>S.selectedIngs[i2]=true); render(); break; }
    case 'toggle-ing': S.selectedIngs[idx]=!S.selectedIngs[idx]; render(); break;
    case 'toggle-all-ings': { const a=btn.dataset.all==='1'; S.addToCoursesRecipe?.ingredients.forEach((_,i2)=>S.selectedIngs[i2]=!a); render(); break; }
    case 'confirm-add-to-courses': await addIngsToCourses(S.addToCoursesRecipe,S.selectedIngs); closeModal(); break;
    case 'copy-recipe': S.modal='copyRecipe'; S.copyRecipeId=id; render(); break;
    case 'copy-recipe-to': await copyRecipeTo(id,parseInt(val),false); break;
    case 'move-recipe-to': await copyRecipeTo(id,parseInt(val),true); break;
    case 'close-modal': closeModal(); break;
    case 'disconnect-confirm': if(confirm('Se déconnecter et réinitialiser la configuration ?')){localStorage.removeItem('sb_url');localStorage.removeItem('sb_key');db=null;S.configured=false;S.categories=[];S.groceries=[];S.recipes=[];S.expenses=[];render();} break;
  }
});

document.addEventListener('input', e => {
  const {id,value}=e.target;
  if(id==='item-name'){S.newName=value;updateSuggestionsDOM(value);}
  else if(id==='item-qty') S.newQty=value;
  else if(id==='cat-edit-inp') S.editingCatVal=value;
  else if(id==='new-cat-inp') S.newCatName=value;
  else if(id==='recipe-name') S.recipeForm.name=value;
  else if(id==='recipe-desc') S.recipeForm.description=value;
  else if(id==='ing-name') S.newIngName=value;
  else if(id==='ing-qty') S.newIngQty=value;
  else if(id==='exp-store') S.expenseForm.store=value;
  else if(id==='exp-amount') S.expenseForm.amount=value;
  else if(id==='exp-date') S.expenseForm.date=value;
});

document.addEventListener('change', e => {
  if(e.target.id==='item-cat') S.newCat=e.target.value;
  else if(e.target.id==='ing-cat') S.newIngCat=e.target.value;
  else if(e.target.id==='recipe-photo-input' && e.target.files?.[0]) handlePhotoSelect(e.target.files[0]);
});

document.addEventListener('keydown', e => {
  if(e.key==='Escape'){closeModal();return;}
  if(e.key!=='Enter') return;
  const id=e.target.id;
  if(id==='item-name'||id==='item-qty') doAddGrocery();
  else if(id==='new-cat-inp') doAddCat();
  else if(id==='cat-edit-inp'){const i=S.editingCatIdx;if(i!==null) doSaveEditCat(i);}
  else if(id==='recipe-name'||id==='recipe-desc') { /* let save button handle */ }
  else if(id==='ing-name'||id==='ing-qty') doAddIng();
  else if(id==='exp-store') document.getElementById('exp-amount')?.focus();
  else if(id==='exp-amount') doSaveExpense();
  else if(id==='sb-url') document.getElementById('sb-key')?.focus();
  else if(id==='sb-key') doConnect();
  else if(id==='edit-name'||id==='edit-qty') doSaveEditItem();
});

document.addEventListener('focusin', e => { if(e.target.id==='item-name') updateSuggestionsDOM(e.target.value); });
document.addEventListener('focusout', e => { if(e.target.id==='item-name') setTimeout(hideSuggestions,160); });
document.addEventListener('mousedown', e => {
  const item=e.target.closest('.sugg-item'); if(!item) return;
  e.preventDefault();
  const {suggName:name,suggQty:qty,suggCat:cat}=item.dataset;
  const nameEl=document.getElementById('item-name');
  const qtyEl=document.getElementById('item-qty');
  const catEl=document.getElementById('item-cat');
  if(nameEl) nameEl.value=name;
  if(qtyEl) qtyEl.value=qty;
  if(catEl&&cat&&S.categories.some(c=>c.name===cat)) catEl.value=cat;
  S.newName=name; S.newQty=qty; S.newCat=cat;
  hideSuggestions();
});

/* ── ACTION HELPERS ─────────────────────────────────────────── */
function closeModal(){ S.modal=null; S.editItemId=null; S.recipeFormId=null; S.editingCatIdx=null; S.addToCoursesRecipe=null; S.copyRecipeId=null; S.editExpenseId=null; render(); }

async function copyRecipeTo(recipeId,destIdx,move){
  const recipe=S.recipes.find(r=>r.id===recipeId); if(!recipe) return;
  closeModal();
  if(move){
    S.recipes=S.recipes.map(r=>r.id===recipeId?{...r,list_index:destIdx}:r); render();
    await db.from('recipes').update({list_index:destIdx}).eq('id',recipeId);
    S.recipeList=destIdx; render();
    showToast(`↗ Déplacée vers ${RECIPE_LISTS[destIdx]}`);
  } else {
    const {data}=await db.from('recipes').insert({name:recipe.name,description:recipe.description,list_index:destIdx,servings:recipe.servings,emoji:recipe.emoji,ingredients:recipe.ingredients||[],photo:recipe.photo||null}).select().single();
    if(data){S.recipes.push(data);render();}
    showToast(`📋 Copiée dans ${RECIPE_LISTS[destIdx]}`);
  }
}

async function doConnect(){
  const url=(document.getElementById('sb-url')?.value||'').trim();
  const key=(document.getElementById('sb-key')?.value||'').trim();
  if(!url||!key){showToast('Remplis les deux champs !');return;}
  try {
    localStorage.setItem('sb_url',url); localStorage.setItem('sb_key',key);
    initDB(url,key); S.configured=true; S.syncStatus='connecting'; render();
    await fetchAll();
    subscribeRealtime();
  } catch(err){ console.error(err); S.syncStatus='error'; render(); showToast('Erreur de connexion. Vérifie tes clés.'); }
}

async function doAddGrocery(){
  const name=(document.getElementById('item-name')?.value||S.newName).trim();
  if(!name){showToast('Entre un article !');return;}
  const qty=(document.getElementById('item-qty')?.value||S.newQty).trim();
  const cat=document.getElementById('item-cat')?.value||S.newCat||S.categories[0]?.name||'Autre';
  addToHist(name,qty,cat);
  S.newName=''; S.newQty='';
  const nameEl=document.getElementById('item-name'); if(nameEl) nameEl.value='';
  const qtyEl=document.getElementById('item-qty'); if(qtyEl) qtyEl.value='';
  hideSuggestions();
  await addGrocery(name,qty,cat);
}

async function doSaveEditItem(){
  const name=(document.getElementById('edit-name')?.value||'').trim();
  const qty=(document.getElementById('edit-qty')?.value||'').trim();
  if(!name){showToast('Nom vide !');return;}
  await updateGrocery(S.editItemId,{name,quantity:qty||null});
  closeModal();
}

async function doAddCat(){
  const inp=document.getElementById('new-cat-inp');
  const name=(inp?.value||S.newCatName).trim(); if(!name) return;
  if(S.categories.some(c=>c.name.toLowerCase()===name.toLowerCase())){showToast('Déjà existante !');return;}
  S.newCatName=''; if(inp) inp.value='';
  await addCategory(name);
}

async function doSaveEditCat(idx){
  const inp=document.getElementById('cat-edit-inp');
  const name=(inp?.value||S.editingCatVal).trim(); if(!name) return;
  const cat=S.categories[idx]; if(!cat) return;
  S.editingCatIdx=null;
  await renameCategory(cat.id,name);
}

function doAddIng(){
  const name=(document.getElementById('ing-name')?.value||S.newIngName).trim(); if(!name) return;
  const qty=(document.getElementById('ing-qty')?.value||S.newIngQty).trim();
  const cat=document.getElementById('ing-cat')?.value||S.newIngCat||S.categories[0]?.name||'Autre';
  S.recipeForm.ingredients=[...(S.recipeForm.ingredients||[]),{name,qty,category:cat}];
  S.newIngName=''; S.newIngQty=''; render();
  setTimeout(()=>document.getElementById('ing-name')?.focus(),50);
}

async function doSaveRecipe(){
  const name=(document.getElementById('recipe-name')?.value||S.recipeForm.name||'').trim();
  if(!name){showToast('Entre un nom !');return;}
  const desc=(document.getElementById('recipe-desc')?.value||S.recipeForm.description||'').trim();
  const form={...S.recipeForm,name,description:desc};
  if(S.recipeFormId) await updateRecipe(S.recipeFormId,form);
  else await addRecipe(form,S.recipeList);
  closeModal();
}

async function doSaveExpense(){
  const store=(document.getElementById('exp-store')?.value||S.expenseForm.store||'').trim();
  if(!store){showToast('Indique le nom du magasin !');return;}
  const amount=parseFloat(document.getElementById('exp-amount')?.value||S.expenseForm.amount||'0');
  if(isNaN(amount)||amount<=0){showToast('Montant invalide !');return;}
  const date=document.getElementById('exp-date')?.value||S.expenseForm.date||todayStr();
  if(S.editExpenseId){
    const eid=S.editExpenseId;
    closeModal();
    await updateExpense(eid,{store,amount,expense_date:date});
    showToast('Dépense modifiée ✓');
  } else {
    const sid=S.shoppingSessionId;
    closeModal();
    await addExpense(store,amount,sid,date);
  }
}

async function doFinCourses(){
  const n=S.groceries.filter(g=>g.checked).length;
  await deleteChecked();
  S.shoppingMode=false; clearShoppingState(); render();
  showToast(n>0?`${n} article${n>1?'s':''} retiré${n>1?'s':''} ✓`:'Mode course terminé');
}

/* ── SHOPPING MODE PERSISTENCE ──────────────────────────────── */
function saveShoppingState(){
  try{ localStorage.setItem('shopping_state', JSON.stringify({mode:S.shoppingMode,sessionId:S.shoppingSessionId})); }catch(e){}
}
function clearShoppingState(){ try{ localStorage.removeItem('shopping_state'); }catch(e){} }

/* ── RECIPE PHOTO ───────────────────────────────────────────── */
function handlePhotoSelect(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=720;
      const scale=Math.min(1,maxW/img.width);
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      S.recipeForm.photo=canvas.toDataURL('image/jpeg',0.72);
      render();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── AUTOCOMPLETE ───────────────────────────────────────────── */
function updateSuggestionsDOM(val){
  const list=document.getElementById('sugg-list'); if(!list) return;
  if(!val||val.length<2){list.style.display='none';return;}
  const matches=getHist().filter(h=>h.name.toLowerCase().includes(val.toLowerCase())).slice(0,6);
  if(!matches.length){list.style.display='none';return;}
  list.innerHTML=matches.map(s=>`<div class="sugg-item" data-sugg-name="${esc(s.name)}" data-sugg-qty="${esc(s.quantity||'')}" data-sugg-cat="${esc(s.category||'')}"><span class="sugg-name">${esc(s.name)}</span><span class="sugg-meta"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${getCatColor(s.category)};margin-right:4px;vertical-align:middle"></span>${s.quantity?esc(s.quantity)+' · ':''}${esc(s.category)}</span></div>`).join('');
  list.style.display='block';
}
function hideSuggestions(){ const l=document.getElementById('sugg-list'); if(l) l.style.display='none'; }

/* ── BOOT ───────────────────────────────────────────────────── */
(async function boot(){
  try{
    const saved=JSON.parse(localStorage.getItem('shopping_state')||'null');
    if(saved&&saved.mode){ S.shoppingMode=true; S.shoppingSessionId=saved.sessionId; S.tab='courses'; }
  }catch(e){}
  const url=localStorage.getItem('sb_url'), key=localStorage.getItem('sb_key');
  if(url&&key){
    try{ initDB(url,key); S.configured=true; S.syncStatus='connecting'; render(); await fetchAll(); subscribeRealtime(); }
    catch(err){ console.error(err); S.syncStatus='error'; render(); }
  } else { render(); }
})();
</script>
