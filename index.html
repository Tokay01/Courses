<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nos Courses & Recettes</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#F0EDE6}
    #root{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#F0EDE6;min-height:100vh;max-width:420px;margin:0 auto;position:relative}

    /* ── SETUP ── */
    .setup-screen{padding:36px 18px 60px;display:flex;flex-direction:column;gap:18px}
    .setup-logo{text-align:center;padding:20px 0 8px}
    .logo-icon{font-size:56px;display:block;margin-bottom:12px}
    .setup-logo h1{font-size:26px;font-weight:800;color:#2A3D2E;line-height:1.2}
    .setup-logo p{font-size:14px;color:#888;margin-top:8px}
    .setup-card{background:#fff;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .setup-card h2{font-size:15px;font-weight:700;color:#2A3D2E}
    .field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#999;margin-bottom:6px}
    .text-input{width:100%;padding:12px 13px;border:1.5px solid #E0DDD6;border-radius:10px;font-family:inherit;font-size:14px;color:#1C1C1C;background:#F0EDE6;outline:none;transition:border-color .15s}
    .text-input:focus{border-color:#2A3D2E}
    .text-input::placeholder{color:#C0BCB6}
    .btn-primary{background:#2A3D2E;color:#fff;border:none;padding:14px;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s}
    .btn-primary:active{opacity:.85}
    details summary{font-size:13px;font-weight:600;color:#2A3D2E;cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:6px}
    details summary::before{content:'▶';font-size:10px;transition:transform .2s}
    details[open] summary::before{transform:rotate(90deg)}
    .sql-block{background:#1A1F1C;color:#7EC88A;border-radius:10px;padding:14px;font-family:'Courier New',monospace;font-size:11px;line-height:1.7;overflow-x:auto;white-space:pre;margin-top:12px}

    /* ── HEADER ── */
    .header{background:#2A3D2E;color:#fff;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:10px;transition:background .3s}
    .header.shopping{background:#B8943A}
    .header h1{font-size:15px;font-weight:800;flex:1}
    .back-link{background:rgba(255,255,255,.18);border:none;color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer;white-space:nowrap}
    .checked-pill{background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
    .sync-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.14);border:none;color:rgba(255,255,255,.9);font-family:inherit;font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;cursor:pointer;white-space:nowrap}
    .sync-pill:hover{background:rgba(255,255,255,.22)}
    .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

    /* ── CONTENT ── */
    .content{padding:14px 14px 90px}
    .content.shop-pad{padding-bottom:152px}

    /* ── NAV ── */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#fff;border-top:1px solid #E0DDD6;display:grid;grid-template-columns:1fr 1fr 1fr;z-index:50}
    .nav-btn{background:none;border:none;padding:10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#999;font-family:inherit;transition:color .15s}
    .nav-btn.active{color:#2A3D2E}
    .nav-icon{font-size:20px}
    .nav-label{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

    /* ── FIN COURSES ── */
    .fin-wrap{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:392px;z-index:45}
    .fin-btn{background:#2A3D2E;color:#fff;border:none;padding:15px;border-radius:13px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(42,61,46,.35);width:100%;transition:opacity .15s}
    .fin-btn:active{opacity:.85}

    /* ── ADD FORM ── */
    .add-form{background:#fff;border-radius:16px;padding:14px;margin-bottom:14px;display:flex;flex-direction:column;gap:9px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .input-row{display:flex;gap:8px;align-items:stretch}
    .qty-input{width:78px;flex:none}
    .cat-row{display:flex;gap:7px;align-items:center}
    .cat-select{flex:1;padding:11px 12px;border:1.5px solid #E0DDD6;border-radius:10px;font-family:inherit;font-size:14px;color:#1C1C1C;background:#F0EDE6;outline:none;cursor:pointer;min-width:0}
    .icon-btn{width:42px;height:42px;border:1.5px solid #E0DDD6;border-radius:10px;background:#F0EDE6;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .icon-btn:hover{border-color:#2A3D2E;background:#fff}
    .btn-add{background:#C8A45A;color:#fff;border:none;padding:12px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .btn-add:active{opacity:.85}

    /* ── AUTOCOMPLETE ── */
    .ac-wrap{position:relative;flex:1;min-width:0}
    .suggestions{position:absolute;top:calc(100% + 5px);left:0;right:0;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.15);z-index:150;overflow:hidden;border:1px solid #EEE}
    .sugg-item{padding:11px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;border-bottom:1px solid #F5F4F1;transition:background .1s}
    .sugg-item:last-child{border-bottom:none}
    .sugg-item:hover{background:#F0EDE6}
    .sugg-name{font-size:14px;font-weight:600;color:#1C1C1C}
    .sugg-meta{font-size:11px;color:#999;white-space:nowrap;text-align:right}

    /* ── START SHOPPING ── */
    .start-shop-btn{background:#2A3D2E;color:#fff;border:none;padding:13px 16px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:18px;transition:opacity .15s}
    .start-shop-btn:active{opacity:.85}

    /* ── SECTION ── */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 7px;padding:0 2px}
    .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;display:flex;align-items:center;gap:7px}
    .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .badge{background:#F5EBD0;color:#C8A45A;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}

    /* ── GROCERY ── */
    .grocery-list{display:flex;flex-direction:column;gap:6px}
    .g-item{background:#fff;border-radius:12px;padding:11px 12px;display:flex;align-items:center;gap:9px;box-shadow:0 1px 4px rgba(0,0,0,.04);border-left:3px solid var(--cc,#5C8A5C)}
    .g-name{font-size:14px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .g-qty{font-size:12px;color:#999;font-weight:600;background:#F0EDE6;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .edit-btn{background:none;border:none;color:#CCC;font-size:15px;cursor:pointer;padding:3px 4px;transition:color .15s;flex-shrink:0}
    .edit-btn:hover{color:#2A3D2E}
    .del-btn{background:none;border:none;color:#CCC;font-size:20px;cursor:pointer;padding:2px 4px;line-height:1;transition:color .15s;flex-shrink:0}
    .del-btn:hover{color:#C94040}

    /* ── SHOPPING ITEMS ── */
    .shop-item{background:#fff;border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s;cursor:pointer;user-select:none}
    .shop-item.done{background:#F7F6F3;box-shadow:none}
    .shop-circle{width:26px;height:26px;border-radius:50%;border:2px solid #E0DDD6;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;transition:all .18s}
    .shop-item:not(.done) .shop-circle:hover{border-color:#4A9E5C;background:#4A9E5C}
    .shop-item.done .shop-circle{background:#4A9E5C;border-color:#4A9E5C}
    .shop-info{flex:1;min-width:0}
    .shop-name{font-size:15px;font-weight:600;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .shop-item.done .shop-name{text-decoration:line-through;color:#AAA;font-weight:500}
    .shop-qty{font-size:12px;color:#BBB;margin-top:1px}

    /* ── EXPENSE CARD ── */
    .expense-card{background:#fff;border-radius:14px;padding:13px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .expense-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .expense-card-title{font-size:13px;font-weight:800;color:#2A3D2E}
    .expense-session-total{font-size:15px;font-weight:800;color:#C8A45A}
    .expense-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F5F3EF}
    .expense-row:last-of-type{border-bottom:none}
    .expense-store{flex:1;font-size:13px;font-weight:600}
    .expense-amount{font-size:14px;font-weight:700;color:#2A3D2E}
    .add-expense-btn{display:flex;align-items:center;justify-content:center;gap:7px;background:#F0EDE6;border:1.5px dashed #D0CDC8;border-radius:9px;padding:9px 13px;color:#999;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;transition:all .15s}
    .add-expense-btn:hover{border-color:#C8A45A;color:#C8A45A}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:44px 20px;color:#999}
    .empty-icon{font-size:42px;margin-bottom:12px}
    .empty p{font-size:14px;line-height:1.7}

    /* ── RECIPES ── */
    .recipe-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#fff;border-radius:14px;padding:4px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .recipe-tabs::-webkit-scrollbar{display:none}
    .rtab{background:none;border:none;padding:9px 13px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;color:#999;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
    .rtab.active{background:#2A3D2E;color:#fff}
    .recipe-list{display:flex;flex-direction:column;gap:10px}
    .recipe-card{background:#fff;border-radius:14px;padding:13px;display:flex;align-items:flex-start;gap:11px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .r-emoji{font-size:28px;flex-shrink:0;margin-top:1px}
    .r-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;margin-top:1px;background:#F0EDE6}
    .photo-upload-btn{display:flex;align-items:center;justify-content:center;gap:7px;background:#F0EDE6;border:1.5px dashed #D0CDC8;border-radius:11px;padding:14px;color:#999;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .15s}
    .photo-upload-btn:hover{border-color:#C8A45A;color:#C8A45A}
    .recipe-photo-preview{position:relative;border-radius:12px;overflow:hidden;height:140px}
    .recipe-photo-preview img{width:100%;height:100%;object-fit:cover;display:block}
    .photo-remove-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .r-info{flex:1;min-width:0}
    .r-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .r-desc{font-size:12px;color:#999;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .r-ing-count{font-size:11px;color:#C8A45A;font-weight:700;margin-top:4px}
    .r-actions{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
    .r-srv{font-size:11px;color:#999;font-weight:600}
    .r-edit-btn{background:none;border:1px solid #E0DDD6;color:#999;padding:4px 8px;border-radius:7px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:600}
    .r-edit-btn:hover{border-color:#2A3D2E;color:#2A3D2E}
    .copy-recipe-btn{background:#F0EDE6;border:1px solid #E0DDD6;color:#666;padding:4px 8px;border-radius:7px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:600}
    .copy-recipe-btn:hover{background:#F5EBD0;border-color:#C8A45A;color:#9A7820}
    .copy-dest-list{display:flex;flex-direction:column;gap:8px}
    .copy-dest-row{background:#F7F6F3;border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:10px}
    .copy-dest-icon{font-size:18px;flex-shrink:0}
    .copy-dest-name{flex:1;font-size:13px;font-weight:600;color:#1C1C1C}
    .copy-dest-btns{display:flex;gap:6px}
    .btn-copy-to{background:#F5EBD0;border:1.5px solid #C8A45A;color:#9A7820;padding:6px 10px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
    .btn-copy-to:hover{background:#C8A45A;color:#fff}
    .btn-move-to{background:#F0EDE6;border:1.5px solid #D0CDC8;color:#555;padding:6px 10px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
    .btn-move-to:hover{background:#2A3D2E;color:#fff;border-color:#2A3D2E}
    .add-courses-btn{background:#F5EBD0;border:1.5px solid #C8A45A;color:#9A7820;padding:5px 10px;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
    .add-courses-btn:hover{background:#C8A45A;color:#fff;border-color:#C8A45A}
    .add-recipe-card{background:#fff;border-radius:14px;border:1.5px dashed #D0CDC8;padding:14px;display:flex;align-items:center;gap:10px;color:#999;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:all .15s}
    .add-recipe-card:hover{border-color:#2A3D2E;color:#2A3D2E}

    /* ── BILAN ── */
    .bilan-period-tabs{display:flex;background:#fff;border-radius:12px;padding:4px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .bilan-ptab{flex:1;background:none;border:none;padding:9px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;color:#999;cursor:pointer;transition:all .15s}
    .bilan-ptab.active{background:#2A3D2E;color:#fff}
    .bilan-summary{background:linear-gradient(135deg,#2A3D2E,#3D5C42);border-radius:14px;padding:18px;margin-bottom:14px;color:#fff}
    .bilan-sum-label{font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.05em}
    .bilan-sum-amount{font-size:32px;font-weight:800;margin:4px 0 2px}
    .bilan-sum-sub{font-size:12px;opacity:.65}
    .bilan-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:10px}
    .bilan-card-head{background:#F5F3EF;padding:11px 15px;display:flex;align-items:center;justify-content:space-between}
    .bilan-period-label{font-size:13px;font-weight:700;color:#2A3D2E;text-transform:capitalize}
    .bilan-total-amount{font-size:15px;font-weight:800;color:#2A3D2E}
    .bilan-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:7px}
    .bilan-store-row{display:flex;align-items:center;gap:9px}
    .bilan-store-name{font-size:13px;font-weight:600;width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bilan-bar-track{flex:1;background:#F0EDE6;border-radius:4px;height:7px;overflow:hidden}
    .bilan-bar-fill{height:100%;background:#C8A45A;border-radius:4px;transition:width .4s}
    .bilan-store-amt{font-size:13px;font-weight:700;color:#444;white-space:nowrap;width:64px;text-align:right}
    .trend-chart-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .trend-chart-title{font-size:12px;font-weight:700;color:#2A3D2E;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
    .trend-svg{width:100%;height:110px;display:block}
    .bilan-card-head{cursor:pointer}
    .bilan-expand-arrow{font-size:11px;color:#AAA;width:14px;text-align:center;flex-shrink:0}
    .bilan-detail-list{display:flex;flex-direction:column;padding:0 14px 10px}
    .bilan-detail-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid #F0EDE6}
    .bilan-detail-date{font-size:11px;color:#AAA;width:42px;flex-shrink:0}
    .bilan-detail-store{flex:1;font-size:13px;font-weight:600;color:#333;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bilan-detail-amt{font-size:13px;font-weight:700;color:#2A3D2E;white-space:nowrap}

    /* ── OVERLAY & SHEET ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .sheet{background:#fff;border-radius:24px 24px 0 0;padding:18px 18px 32px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;animation:up .22s cubic-bezier(.34,1.15,.64,1);max-height:92vh;overflow-y:auto}
    @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .handle{width:36px;height:4px;background:#E0DDD6;border-radius:2px;margin:0 auto 2px;flex-shrink:0}
    .sheet-title{font-size:17px;font-weight:800;color:#2A3D2E;flex-shrink:0}
    .modal-actions{display:flex;gap:9px;flex-shrink:0}
    .btn-cancel{background:#F0EDE6;border:none;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;color:#999;cursor:pointer;flex:1}
    .btn-save{flex:2;background:#2A3D2E;color:#fff;border:none;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
    .btn-save:active{opacity:.85}
    .btn-save:disabled{opacity:.4;cursor:default}
    .btn-danger{background:#FEF2F2;border:none;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;color:#C94040;cursor:pointer;width:100%;flex-shrink:0}
    .btn-danger:hover{background:#FCDCDC}

    /* ── CATEGORIES MODAL ── */
    .cat-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
    .cat-row-item{display:flex;align-items:center;gap:8px;background:#F7F6F3;border-radius:10px;padding:9px 11px}
    .cat-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .cat-item-name{flex:1;font-size:14px;font-weight:600;color:#1C1C1C}
    .cat-edit-input{flex:1;padding:5px 9px;border:1.5px solid #2A3D2E;border-radius:7px;font-family:inherit;font-size:14px;font-weight:600;outline:none;background:#fff}
    .cat-action-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:2px 4px;color:#999;transition:color .15s;flex-shrink:0}
    .cat-action-btn:hover{color:#1C1C1C}
    .cat-save-btn{background:#2A3D2E;color:#fff;border:none;padding:5px 11px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    .cat-order-btns{display:flex;gap:3px}
    .cat-order-btn{background:none;border:1px solid #E0DDD6;color:#999;width:24px;height:24px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0;transition:all .12s}
    .cat-order-btn:hover:not(:disabled){border-color:#2A3D2E;color:#2A3D2E}
